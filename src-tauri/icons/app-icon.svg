<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0c0a1a"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Top pane: full-width terminal -->
  <rect x="48" y="56" width="416" height="162" rx="14"
        fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.09)" stroke-width="1.5"/>
  <!-- Chevron prompt -->
  <polyline points="70,138 92,120 70,102"
            fill="none" stroke="#8b5cf6" stroke-width="9"
            stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Command text lines -->
  <rect x="108" y="113" width="130" height="8" rx="4" fill="rgba(255,255,255,0.55)"/>
  <rect x="108" y="131" width="90"  height="7" rx="3.5" fill="rgba(255,255,255,0.18)"/>
  <rect x="108" y="148" width="150" height="7" rx="3.5" fill="rgba(255,255,255,0.13)"/>
  <!-- Blinking cursor -->
  <rect x="108" y="168" width="9" height="15" rx="2" fill="#8b5cf6"/>

  <!-- Bottom-left pane: second terminal (green) -->
  <rect x="48" y="238" width="196" height="218" rx="14"
        fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.09)" stroke-width="1.5"/>
  <polyline points="70,318 92,300 70,282"
            fill="none" stroke="#34d399" stroke-width="9"
            stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="108" y="293" width="90"  height="7" rx="3.5" fill="rgba(255,255,255,0.35)"/>
  <rect x="108" y="311" width="110" height="7" rx="3.5" fill="rgba(255,255,255,0.15)"/>
  <rect x="108" y="329" width="70"  height="7" rx="3.5" fill="rgba(255,255,255,0.12)"/>
  <!-- Running indicator dot -->
  <circle cx="108" cy="374" r="5" fill="#34d399"/>
  <rect x="120" y="370" width="60" height="7" rx="3.5" fill="rgba(255,255,255,0.25)"/>

  <!-- Bottom-right pane: editor / preview -->
  <rect x="268" y="238" width="196" height="218" rx="14"
        fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.09)" stroke-width="1.5"/>
  <!-- Syntax-coloured code lines -->
  <rect x="288" y="268" width="38" height="7" rx="3.5" fill="#8b5cf6" opacity="0.85"/>
  <rect x="334" y="268" width="90" height="7" rx="3.5" fill="rgba(255,255,255,0.4)"/>
  <rect x="288" y="288" width="26" height="7" rx="3.5" fill="#34d399" opacity="0.85"/>
  <rect x="322" y="288" width="110" height="7" rx="3.5" fill="rgba(255,255,255,0.28)"/>
  <rect x="288" y="308" width="32" height="7" rx="3.5" fill="#f59e0b" opacity="0.85"/>
  <rect x="328" y="308" width="70"  height="7" rx="3.5" fill="rgba(255,255,255,0.28)"/>
  <rect x="288" y="328" width="130" height="7" rx="3.5" fill="rgba(255,255,255,0.14)"/>
  <rect x="288" y="348" width="100" height="7" rx="3.5" fill="rgba(255,255,255,0.14)"/>
  <rect x="288" y="368" width="115" height="7" rx="3.5" fill="rgba(255,255,255,0.14)"/>
  <rect x="288" y="388" width="80"  height="7" rx="3.5" fill="rgba(255,255,255,0.10)"/>
</svg>
