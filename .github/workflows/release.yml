name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest  # GitHub hosted — free for public repos
            os: windows
            args: ''
            rust-targets: ''

          - platform: macos-13       # macOS Intel (x86_64)
            os: macos
            args: '--target x86_64-apple-darwin'
            rust-targets: 'x86_64-apple-darwin'

          - platform: macos-latest   # macOS Apple Silicon (arm64)
            os: macos
            args: '--target aarch64-apple-darwin'
            rust-targets: 'aarch64-apple-darwin'

          - platform: ubuntu-22.04   # Linux x86_64
            os: linux
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Pin npm explicitly so tauri-action never auto-detects another package manager
          tauriScript: npm run tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'Soryq ${{ github.ref_name }}'
          releaseBody: |
            See [CHANGELOG.md](https://github.com/Samuel00098/soryq/blob/main/CHANGELOG.md) for what's new.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
