name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # Create the release in soryq-releases before the matrix builds run,
  # because tauri-action requires the release to already exist in the target repo
  # to avoid target_commitish validation errors (since the build commit does not
  # exist in the releases repo).
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Create release in soryq-releases
        env:
          GH_TOKEN: ${{ secrets.RELEASES_PAT }}
        run: |
          TAG="${{ github.ref_name }}"

          # Check if the release already exists in soryq-releases
          if gh release view "$TAG" --repo Samuel00098/soryq-releases >/dev/null 2>&1; then
            echo "Release $TAG already exists in soryq-releases, continuing."
          else
            echo "Creating release $TAG in soryq-releases..."
            gh release create "$TAG" \
              --repo Samuel00098/soryq-releases \
              --title "Soryq $TAG" \
              --notes "See the changelog for what is new in this release." \
              --target main
          fi

  release:
    needs: prepare
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest  # GitHub hosted — free for public repos
            os: windows
            args: ''
            rust-targets: ''

          - platform: macos-13       # macOS Intel (x86_64)
            os: macos
            args: '--target x86_64-apple-darwin'
            rust-targets: 'x86_64-apple-darwin'

          - platform: macos-latest   # macOS Apple Silicon (arm64)
            os: macos
            args: '--target aarch64-apple-darwin'
            rust-targets: 'aarch64-apple-darwin'

          - platform: ubuntu-22.04   # Linux x86_64
            os: linux
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASES_PAT }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Pin npm explicitly so tauri-action never auto-detects another package manager
          tauriScript: npm run tauri
          # Publish the release to the separate public releases repo
          owner: Samuel00098
          repo: soryq-releases
          tagName: ${{ github.ref_name }}
          releaseName: 'Soryq ${{ github.ref_name }}'
          releaseBody: 'See the changelog for what is new in this release.'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
